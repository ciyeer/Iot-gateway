name: Build & Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Install clang-format
      run: sudo apt-get update && sudo apt-get install -y clang-format

    - name: Check Code Style
      run: ./tools/check_format.sh

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Lowercase Repository Name
      id: repo_name
      run: |
        echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

    - name: Build & Push Builder Image
      uses: docker/build-push-action@v5
      with:
        context: tools/docker
        file: tools/docker/Dockerfile
        push: true
        tags: ghcr.io/${{ env.REPO }}/builder:latest
        build-args: |
          USE_CHINA_MIRROR=false
        cache-from: type=registry,ref=ghcr.io/${{ env.REPO }}/builder:latest
        cache-to: type=inline
      
    - name: Build Project
      # 使用刚刚构建并推送的镜像作为构建环境
      # 注意：run_docker_build.sh 默认使用 local 的 iotgw-builder
      # 我们可以在脚本执行前把 GHCR 的镜像 retag 为本地镜像
      run: |
        docker pull ghcr.io/${{ env.REPO }}/builder:latest
        docker tag ghcr.io/${{ env.REPO }}/builder:latest iotgw-builder
        ./tools/docker/run_docker_build.sh

      
    - name: Locate Artifact
      id: locate-artifact
      run: |
        ARTIFACT_PATH=$(ls build/aarch64/release/deploy/*.tar.gz | head -n 1)
        echo "Found artifact: $ARTIFACT_PATH"
        echo "artifact_path=$ARTIFACT_PATH" >> $GITHUB_OUTPUT
        echo "artifact_name=$(basename $ARTIFACT_PATH)" >> $GITHUB_OUTPUT

    - name: Upload Artifact (CI)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.locate-artifact.outputs.artifact_name }}
        path: ${{ steps.locate-artifact.outputs.artifact_path }}
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.locate-artifact.outputs.artifact_path }}
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
