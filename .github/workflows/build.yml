name: Build & Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Builder Image
      # 使用阿里云镜像源可能会在 GitHub Actions (海外环境) 变慢，但为了保持一致性我们还是用同一个 Dockerfile
      run: docker build -t iotgw-builder -f tools/docker/Dockerfile tools/docker
      
    - name: Build & Package
      run: ./tools/docker/run_docker_build.sh
      
    - name: Locate Artifact
      id: locate-artifact
      run: |
        ARTIFACT_PATH=$(ls build/aarch64/release/deploy/*.tar.gz | head -n 1)
        echo "Found artifact: $ARTIFACT_PATH"
        echo "artifact_path=$ARTIFACT_PATH" >> $GITHUB_OUTPUT
        echo "artifact_name=$(basename $ARTIFACT_PATH)" >> $GITHUB_OUTPUT

    - name: Upload Artifact (CI)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.locate-artifact.outputs.artifact_name }}
        path: ${{ steps.locate-artifact.outputs.artifact_path }}
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.locate-artifact.outputs.artifact_path }}
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
