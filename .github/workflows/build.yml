name: Build ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Builder Image
      run: docker build -t iotgw-builder -f tools/docker/Dockerfile tools/docker
      
    - name: Build Project
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          iotgw-builder \
          bash -c "
            # 配置阿里云镜像源已在 Dockerfile 中完成，无需额外操作
            
            # 使用新的 CMake 配置方式
            cmake -S IotEdgeGateway -B build/aarch64/release \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE=/workspace/tools/docker/toolchain-aarch64.cmake
            
            # 编译 (Strip 已集成在 CMake POST_BUILD 中)
            cmake --build build/aarch64/release
          "
          
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iotgw_gateway_aarch64
        path: build/aarch64/release/iotgw_gateway
