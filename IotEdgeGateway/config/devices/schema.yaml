# 设备通信协议约定 (Schema Contract)
# 该文件定义了网关(Gateway)与设备(Device)之间的通信数据格式
# 基于 "Unified Device Model" (统一设备模型)

version: "1.1"

# 全局约定
# 1. 话题前缀: iotgw/dev/
# 2. 上行(Telemetry): iotgw/dev/telemetry/<device_id>
# 3. 下行(Command): iotgw/dev/cmd/<device_id>
# 4. 数据格式 (Envelope):
#    {
#      "device_id": "...",
#      "type": "sensor" | "actuator",
#      "data": { ... },
#      "ts": <timestamp>
#    }

devices:
  # --- 传感器 (Sensors) ---
  
  temp:
    description: "温度传感器"
    telemetry_topic: "iotgw/dev/telemetry/temp"
    payload_schema:
      type: object
      properties:
        device_id: { type: string, const: "temp" }
        type: { type: string, const: "sensor" }
        data:
          type: object
          properties:
            value: { type: number, description: "温度值" }
        ts: { type: integer }
      example: 
        device_id: "temp"
        type: "sensor"
        data: { "value": 25.5 }
        ts: 1700000000

  humi:
    description: "湿度传感器"
    telemetry_topic: "iotgw/dev/telemetry/humi"
    payload_schema:
      type: object
      properties:
        device_id: { type: string, const: "humi" }
        type: { type: string, const: "sensor" }
        data:
          type: object
          properties:
            value: { type: number, description: "湿度值" }
      example:
        device_id: "humi"
        type: "sensor"
        data: { "value": 60.0 }
        ts: 1700000000

  light:
    description: "光照传感器"
    telemetry_topic: "iotgw/dev/telemetry/light"
    payload_schema:
      type: object
      properties:
        data: { properties: { value: { type: number } } }
      example: { "device_id": "light", "type": "sensor", "data": { "value": 500 }, "ts": 1700000000 }

  ir:
    description: "红外传感器"
    telemetry_topic: "iotgw/dev/telemetry/ir"
    payload_schema:
      type: object
      properties:
        data: { properties: { value: { type: number } } }
      example: { "device_id": "ir", "type": "sensor", "data": { "value": 2500 }, "ts": 1700000000 }

  # --- 执行器 (Actuators) ---
  
  led:
    description: "LED灯"
    command_topic: "iotgw/dev/cmd/led"
    telemetry_topic: "iotgw/dev/telemetry/led"
    payload_schema:
      type: object
      properties:
        device_id: { type: string, const: "led" }
        type: { type: string, const: "actuator" }
        data:
          type: object
          properties:
            on: { type: integer, enum: [0, 1] }
            br: { type: integer, min: 0, max: 100 }
      example: { "device_id": "led", "type": "actuator", "data": { "on": 1, "br": 80 }, "ts": 1700000000 }

  motor:
    description: "电机"
    command_topic: "iotgw/dev/cmd/motor"
    telemetry_topic: "iotgw/dev/telemetry/motor"
    payload_schema:
      type: object
      properties:
        data:
          type: object
          properties:
            on: { type: integer }
            sp: { type: integer }
            dir: { type: integer }
      example: { "device_id": "motor", "type": "actuator", "data": { "on": 1, "sp": 50, "dir": 0 }, "ts": 1700000000 }

  buzzer:
    description: "蜂鸣器"
    command_topic: "iotgw/dev/cmd/buzzer"
    telemetry_topic: "iotgw/dev/telemetry/buzzer"
    payload_schema:
      type: object
      properties:
        data: { properties: { on: { type: integer } } }
      example: { "device_id": "buzzer", "type": "actuator", "data": { "on": 1 }, "ts": 1700000000 }
